<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audio Processor</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0f0f0f; color: #e0e0e0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 32px; width: 100%; max-width: 540px; }
  h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 24px; color: #fff; }
  .drop-zone {
    border: 2px dashed #333; border-radius: 8px; padding: 40px 20px;
    text-align: center; cursor: pointer; transition: border-color 0.2s;
    margin-bottom: 20px;
  }
  .drop-zone:hover, .drop-zone.dragover { border-color: #6366f1; }
  .drop-zone input { display: none; }
  .drop-zone p { color: #666; font-size: 0.9rem; margin-top: 8px; }
  .drop-zone .icon { font-size: 2rem; }
  .options { display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 16px; }
  .option { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 0.9rem; }
  .option input[type=checkbox] { accent-color: #6366f1; width: 16px; height: 16px; }
  .lang-row { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; font-size: 0.9rem; }
  .lang-row input[type=text] {
    background: #111; border: 1px solid #333; color: #e0e0e0;
    border-radius: 6px; padding: 5px 10px; width: 70px; font-size: 0.9rem;
  }
  .lang-row input[type=text]:focus { outline: none; border-color: #6366f1; }
  button {
    width: 100%; padding: 12px; background: #6366f1; color: #fff;
    border: none; border-radius: 8px; font-size: 1rem; cursor: pointer;
    transition: background 0.2s;
  }
  button:hover { background: #4f52d4; }
  button:disabled { background: #333; color: #666; cursor: not-allowed; }
  .status { margin-top: 20px; padding: 14px; background: #111; border-radius: 8px; font-size: 0.85rem; display: none; }
  .status.visible { display: block; }
  .status .label { color: #888; margin-bottom: 6px; }
  .status .value { font-weight: 500; }
  .status.error .value { color: #f87171; }
  .status.done .value { color: #4ade80; }
  .results { margin-top: 16px; display: flex; flex-direction: column; gap: 8px; }
  .result-link {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; background: #222; border-radius: 6px; text-decoration: none;
    color: #a5b4fc; font-size: 0.85rem; border: 1px solid #2a2a2a;
    transition: background 0.2s;
  }
  .result-link:hover { background: #2a2a2a; }
  .progress { height: 4px; background: #222; border-radius: 2px; margin-top: 12px; overflow: hidden; display: none; }
  .progress.visible { display: block; }
  .progress-bar { height: 100%; background: #6366f1; width: 30%; animation: slide 1.2s ease-in-out infinite; }
  @keyframes slide { 0% { margin-left: -30%; } 100% { margin-left: 100%; } }
  .filename { font-size: 0.8rem; color: #666; margin-top: 4px; word-break: break-all; }
</style>
</head>
<body>
<div class="card">
  <h1>🎵 Audio Processor</h1>

  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept="video/*,audio/*">
    <div class="icon">📁</div>
    <strong>Drop video / audio here</strong>
    <p>or click to browse</p>
    <p id="selectedFile" class="filename"></p>
  </div>

  <button id="runBtn" disabled>Remove Vocals (GPU)</button>

  <div class="progress" id="progress"><div class="progress-bar"></div></div>

  <div class="status" id="status">
    <div class="label">Status</div>
    <div class="value" id="statusText">—</div>
    <div id="progressText" style="margin-top:6px;color:#888;font-size:0.8rem;word-break:break-all"></div>
  </div>

  <div class="results" id="results"></div>
</div>

<script>
  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const runBtn = document.getElementById('runBtn');
  const statusEl = document.getElementById('status');
  const statusText = document.getElementById('statusText');
  const resultsEl = document.getElementById('results');
  const progressEl = document.getElementById('progress');
  const selectedFile = document.getElementById('selectedFile');

  let jobId = null;
  let pollTimer = null;

  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    if (e.dataTransfer.files[0]) { fileInput.files = e.dataTransfer.files; onFileSelected(); }
  });
  fileInput.addEventListener('change', onFileSelected);

  function onFileSelected() {
    const f = fileInput.files[0];
    if (!f) return;
    selectedFile.textContent = f.name;
    runBtn.disabled = false;
    jobId = null;
    resultsEl.innerHTML = '';
    statusEl.className = 'status';
  }

  runBtn.addEventListener('click', async () => {
    if (!fileInput.files[0]) return;
    runBtn.disabled = true;
    progressEl.classList.add('visible');
    resultsEl.innerHTML = '';

    // Upload
    setStatus('uploading…', '');
    const form = new FormData();
    form.append('file', fileInput.files[0]);
    const up = await fetch('/upload', { method: 'POST', body: form });
    if (!up.ok) { setStatus('Upload failed', 'error'); return; }
    jobId = (await up.json()).job_id;

    // Start processing — always extract + remove vocals, no transcribe
    await fetch(`/process/${jobId}?extract_audio=true&remove_vocals=true&transcribe=false&language=zh`, { method: 'POST' });

    setStatus('processing…', '');
    pollTimer = setInterval(poll, 2000);
  });

  async function poll() {
    if (!jobId) return;
    const r = await fetch(`/status/${jobId}`);
    if (!r.ok) return;
    const data = await r.json();

    const labels = {
      uploaded: 'Uploaded',
      extracting_audio: 'Extracting audio…',
      removing_vocals: 'Removing vocals (GPU)…',
      transcribing: 'Transcribing (Whisper)…',
      done: 'Done ✓',
      error: 'Error',
    };

    setStatus(labels[data.status] || data.status, data.status);
    document.getElementById('progressText').textContent = data.progress || '';

    if (data.status === 'done') {
      clearInterval(pollTimer);
      progressEl.classList.remove('visible');
      runBtn.disabled = false;
      showResults(data);
    } else if (data.status === 'error') {
      clearInterval(pollTimer);
      progressEl.classList.remove('visible');
      runBtn.disabled = false;
      if (data.error) statusText.textContent += ': ' + data.error;
    }
  }

  function setStatus(msg, cls) {
    statusEl.className = 'status visible' + (cls ? ' ' + cls : '');
    statusText.textContent = msg;
  }

  function showResults(data) {
    const files = [
      { key: 'audio', label: '🎵 Extracted audio (WAV)' },
      { key: 'no_vocals', label: '🎸 No vocals (instrumental)' },
      { key: 'vocals', label: '🎤 Vocals only' },
      { key: 'transcript', label: '📝 Transcript (SRT)' },
    ];
    resultsEl.innerHTML = '';
    for (const { key, label } of files) {
      if (!data[key]) continue;
      const a = document.createElement('a');
      a.className = 'result-link';
      a.href = data[key];
      a.download = '';
      a.innerHTML = `<span>${label}</span><span>⬇ Download</span>`;
      resultsEl.appendChild(a);
    }
  }
</script>
</body>
</html>
